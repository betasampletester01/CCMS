<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Coaching Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex h-screen items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-blue-900 mb-6 text-center">Admin Login</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded {% if category == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" name="email" required class="mt-1 w-full p-2 border rounded focus:ring focus:ring-blue-200 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" required class="mt-1 w-full p-2 border rounded focus:ring focus:ring-blue-200 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 transition">Login</button>
        </form>
  <!-- ... ऊपर का फॉर्म कोड ... -->
        <p class="mt-4 text-center text-sm text-gray-600">Don't have an account? <a href="/register" class="text-blue-600 font-semibold">Register here</a></p>
        
        <!-- Google Button यहाँ आएगा (</div> के अंदर) -->
        <div class="mt-4 flex items-center justify-between">
            <span class="border-b w-1/5 lg:w-1/4"></span>
            <a href="#" class="text-xs text-center text-gray-500 uppercase">or</a>
            <span class="border-b w-1/5 lg:w-1/4"></span>
        </div>

        <a href="{{ url_for('google_login') }}" class="mt-4 flex items-center justify-center w-full border border-gray-300 rounded-lg shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo" class="h-5 w-5 mr-2">
            Continue with Google
        </a>

    </div> <!-- यह मेन बॉक्स यहाँ बंद होना चाहिए -->
</body>
</html>
