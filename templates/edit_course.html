<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Course - {{ current_user.institute_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex h-screen items-center justify-center p-6">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-100">
        <h2 class="text-2xl font-bold text-blue-900 mb-6 border-b pb-2">Edit Course</h2>
        
        <form method="POST" action="/edit_course/{{ course.id }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Course Name</label>
                <input type="text" name="course_name" value="{{ course.name }}" required class="mt-1 w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Description</label>
                <textarea name="description" rows="2" class="mt-1 w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none">{{ course.description }}</textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Course Duration</label>
                <input type="text" name="duration" value="{{ course.duration }}" required class="mt-1 w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none">
            </div>

            <div class="flex space-x-4">
                <div class="w-1/2">
                    <label class="block text-sm font-medium text-gray-700">Total Fee</label>
                    <input type="number" name="total_fee" value="{{ course.total_fee }}" required class="mt-1 w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none">
                </div>
                <div class="w-1/2">
                    <label class="block text-sm font-medium text-gray-700">Univ. Share</label>
                    <input type="number" name="university_share" value="{{ course.university_share }}" required class="mt-1 w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none">
                </div>
            </div>

            <div class="flex space-x-4 mt-6">
                <a href="/courses" class="w-1/2 bg-gray-400 text-white font-bold py-2.5 rounded-lg hover:bg-gray-500 text-center transition">Cancel</a>
                <button type="submit" class="w-1/2 bg-teal-500 text-white font-bold py-2.5 rounded-lg hover:bg-teal-600 transition shadow-sm">Update Course</button>
            </div>
        </form>
    </div>
</body>
</html>
